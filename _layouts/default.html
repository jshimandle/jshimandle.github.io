<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>
    {% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}
  </title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  <!-- Feather icons (lightweight SVG icon set) -->
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
</head>
<body>

  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Search index -->
  <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  <!-- Main JS -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

  <script>
    // Activate Feather icons
    document.addEventListener('DOMContentLoaded', () => feather.replace());
  </script>
</body>
</html>
