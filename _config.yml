# ============================================================
#  SITE CONFIGURATION — edit the fields marked with (*)
# ============================================================

# (*) Your full name — appears in the nav logo and page titles
title: "Your Name"

# (*) One-line tagline shown in the hero section
tagline: "Mechanical Engineering Student & Creative"

# (*) Short description used in meta tags
description: "Portfolio of engineering projects, essays, photography, and creative work."

# (*) Your GitHub Pages URL: https://<username>.github.io
url: "https://yourusername.github.io"
baseurl: ""  # leave empty unless repo is a project page (not username.github.io)

# (*) Fill in whichever you use; delete or leave blank the rest
author:
  name: "Your Name"
  email: "you@email.com"
  github: "yourusername"
  linkedin: "yourlinkedin"
  twitter: ""          # optional
  instagram: ""        # optional

# (*) University / program info shown in About and Resume sections
education:
  university: "Your University"
  degree: "B.S. Mechanical Engineering"
  year: "Class of 2026"

# ── Jekyll internals ─────────────────────────────────────────
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

paginate: 5
paginate_path: "/blog/page:num/"

permalink: /blog/:year/:month/:day/:title/

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project

markdown: kramdown
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - .gitignore
