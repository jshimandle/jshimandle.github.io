<header class="site-header" id="site-header">
  <nav class="nav container" role="navigation" aria-label="Main navigation">

    <a class="nav-logo" href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>

    <!-- Desktop nav links -->
    <ul class="nav-links" id="nav-links">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>About</a></li>
      <li><a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a></li>
      <!--
      <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
      -->
      <li><a href="{{ '/resume/' | relative_url }}" {% if page.url contains '/resume' %}class="active"{% endif %}>Resume</a></li>
      <li><a href="{{ '/contact/' | relative_url }}" {% if page.url contains '/contact' %}class="active"{% endif %}>Contact</a></li>
    </ul>

    <!-- Mobile hamburger -->
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

  </nav>
</header>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search posts, projects…" autocomplete="off" />
    <button id="search-close" aria-label="Close search"><i data-feather="x"></i></button>
    <ul id="search-results" class="search-results" aria-live="polite"></ul>
  </div>
</div>
